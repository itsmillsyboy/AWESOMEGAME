<!DOCTYPE html>
<html>
<head>
    <title>Neon Arena</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; font-family: 'Courier New', Courier, monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: #00ff88; pointer-events: none; text-shadow: 0 0 10px #00ff88; }
        #leaderboard { position: absolute; top: 20px; right: 20px; color: #ff00ff; text-align: right; text-shadow: 0 0 10px #ff00ff; }
        .death-flash { position: absolute; inset: 0; background: red; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
    </style>
</head>
<body>
    <div id="flash" class="death-flash"></div>
    <div id="ui">
        ONLINE: <span id="count">0</span><br>
        MOVE: WASD | SHOOT: SPACE
    </div>
    <div id="leaderboard">
        LEADERBOARD<br><div id="list"></div>
    </div>
    <canvas id="g"></canvas>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('g');
        const ctx = canvas.getContext('2d');
        const flash = document.getElementById('flash');
        
        let myPos = { x: 400, y: 300 };
        let myDir = { x: 1, y: 0 };
        let players = {};
        const keys = {};

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        socket.on('updatePlayers', (data) => { 
            players = data; 
            document.getElementById('count').innerText = Object.keys(data).length;
            updateLeaderboard();
        });

        socket.on('death', () => {
            flash.style.opacity = '0.5';
            setTimeout(() => flash.style.opacity = '0', 100);
        });

        function updateLeaderboard() {
            const list = Object.values(players)
                .sort((a, b) => b.kills - a.kills)
                .slice(0, 5)
                .map(p => `${p.name}: ${p.kills}`)
                .join('<br>');
            document.getElementById('list').innerHTML = list;
        }

        window.addEventListener('keydown', e => {
            keys[e.code] = true;
            if(e.code === 'Space') socket.emit('shoot');
        });
        window.addEventListener('keyup', e => keys[e.code] = false);

        function update() {
            let moved = false;
            let dx = 0, dy = 0;

            if(keys['KeyW']) { dy = -6; moved = true; }
            if(keys['KeyS']) { dy = 6; moved = true; }
            if(keys['KeyA']) { dx = -6; moved = true; }
            if(keys['KeyD']) { dx = 6; moved = true; }

            if(moved) {
                // Update Position with BORDER LOCK
                myPos.x = Math.max(0, Math.min(canvas.width - 30, myPos.x + dx));
                myPos.y = Math.max(0, Math.min(canvas.height - 30, myPos.y + dy));
                
                // Update Facing Direction
                myDir = { x: dx !== 0 ? dx/6 : 0, y: dy !== 0 ? dy/6 : 0 };
                
                socket.emit('move', { x: myPos.x, y: myPos.y, dir: myDir });
            }
        }

        function draw() {
            update();
            ctx.fillStyle = 'rgba(5, 5, 5, 0.4)'; // Motion blur
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            for(let id in players) {
                const p = players[id];
                
                // Player Glow
                ctx.shadowBlur = 15;
                ctx.shadowColor = p.color;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x, p.y, 30, 30);
                
                // Direction Indicator (Small dot)
                ctx.fillStyle = 'white';
                ctx.fillRect(p.x + 12 + (p.dir.x * 10), p.y + 12 + (p.dir.y * 10), 6, 6);

                // Bullets
                p.bullets.forEach(b => {
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = 'white';
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(b.x, b.y, 4, 0, Math.PI*2);
                    ctx.fill();
                });
            }
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
